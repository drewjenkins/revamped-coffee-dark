<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Revamped Coffee Co — Dark Design</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Crimson+Text:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }
body { background: #0a0a0a; color: #e8e0d6; font-family: 'Crimson Text', Georgia, serif; overflow-x: hidden; }

:root {
  --blood: #8b1a1a;
  --blood-light: #a52a2a;
  --ember: #c4551a;
  --bone: #e8e0d6;
  --fog: #9a928a;
  --midnight: #0a0a0a;
  --charcoal: #151515;
  --smoke: #1e1e1e;
}

/* Scrollbar */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--midnight); }
::-webkit-scrollbar-thumb { background: var(--blood); border-radius: 3px; }

/* Fog overlay animation */
@keyframes fogDrift {
  0% { transform: translateX(-20%) translateY(0); opacity: 0.03; }
  50% { transform: translateX(10%) translateY(-5px); opacity: 0.06; }
  100% { transform: translateX(-20%) translateY(0); opacity: 0.03; }
}

@keyframes flicker {
  0%, 100% { opacity: 1; }
  92% { opacity: 1; }
  93% { opacity: 0.8; }
  94% { opacity: 1; }
  96% { opacity: 0.9; }
  97% { opacity: 1; }
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(30px); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes slideIn {
  from { opacity: 0; transform: translateX(-20px); }
  to { opacity: 1; transform: translateX(0); }
}

@keyframes pulse-glow {
  0%, 100% { box-shadow: 0 0 20px rgba(139,26,26,0.2); }
  50% { box-shadow: 0 0 40px rgba(139,26,26,0.4); }
}

.fade-up { animation: fadeUp 0.8s ease-out forwards; opacity: 0; }
.fade-up-delay-1 { animation-delay: 0.15s; }
.fade-up-delay-2 { animation-delay: 0.3s; }
.fade-up-delay-3 { animation-delay: 0.45s; }

/* Nav */
nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  background: rgba(10,10,10,0.85);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid rgba(139,26,26,0.2);
  transition: all 0.3s;
}
nav.scrolled { background: rgba(10,10,10,0.95); }

/* Section styling */
section { position: relative; }
section::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; bottom: 0;
  background: radial-gradient(ellipse at 50% 0%, rgba(139,26,26,0.04) 0%, transparent 70%);
  pointer-events: none;
}

/* Menu card hover */
.menu-card {
  background: var(--charcoal);
  border: 1px solid rgba(139,26,26,0.15);
  transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
}
.menu-card:hover {
  border-color: rgba(139,26,26,0.5);
  transform: translateY(-2px);
  box-shadow: 0 8px 30px rgba(139,26,26,0.15);
}

/* Review card */
.review-card {
  background: var(--charcoal);
  border: 1px solid rgba(232,224,214,0.06);
  transition: all 0.3s;
}
.review-card:hover {
  border-color: rgba(139,26,26,0.3);
}

/* Blood drip divider */
.blood-divider {
  height: 2px;
  background: linear-gradient(90deg, transparent, var(--blood), transparent);
  opacity: 0.5;
}

/* CTA button */
.cta-btn {
  background: var(--blood);
  color: var(--bone);
  padding: 14px 36px;
  font-family: 'Inter', sans-serif;
  font-weight: 500;
  font-size: 14px;
  letter-spacing: 2px;
  text-transform: uppercase;
  border: none;
  cursor: pointer;
  position: relative;
  overflow: hidden;
  transition: all 0.3s;
}
.cta-btn:hover {
  background: var(--blood-light);
  box-shadow: 0 0 30px rgba(139,26,26,0.4);
}
.cta-btn::after {
  content: '';
  position: absolute; top: 0; left: -100%; width: 100%; height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
  transition: left 0.5s;
}
.cta-btn:hover::after { left: 100%; }

/* Ghost button */
.ghost-btn {
  background: transparent;
  color: var(--bone);
  padding: 12px 32px;
  font-family: 'Inter', sans-serif;
  font-weight: 400;
  font-size: 13px;
  letter-spacing: 2px;
  text-transform: uppercase;
  border: 1px solid rgba(232,224,214,0.2);
  cursor: pointer;
  transition: all 0.3s;
}
.ghost-btn:hover {
  border-color: var(--blood);
  color: var(--blood-light);
}

/* Star rating */
.star { color: var(--ember); }

/* Pentagram bullet */
.penta::before {
  content: '⛧';
  margin-right: 10px;
  color: var(--blood);
  font-size: 12px;
}

/* mobile */
@media (max-width: 768px) {
  .hero-title { font-size: 2.5rem !important; }
  .menu-grid { grid-template-columns: 1fr !important; }
}
</style>
</head>

function Nav() {
  const [scrolled, setScrolled] = useState(false);
  const [menuOpen, setMenuOpen] = useState(false);
  useEffect(() => {
    const handler = () => setScrolled(window.scrollY > 50);
    window.addEventListener('scroll', handler);
    return () => window.removeEventListener('scroll', handler);
  }, []);

  const links = [
    { label: "Story", href: "#story" },
    { label: "Menu", href: "#menu" },
    { label: "Community", href: "#community" },
    { label: "Reviews", href: "#reviews" },
    { label: "Visit", href: "#visit" },
  ];

  return (
    <nav className={scrolled ? 'scrolled' : ''}>
      <div style={{ maxWidth: 1200, margin: '0 auto', padding: '16px 24px', display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
        <a href="#" style={{ textDecoration: 'none', color: 'var(--bone)', fontFamily: "'Cinzel Decorative', serif", fontSize: 18, fontWeight: 700, letterSpacing: 1 }}>
          REVAMPED<span style={{ color: 'var(--blood)' }}>.</span>
        </a>

        {/* Desktop nav */}
        <div style={{ display: 'flex', gap: 32, alignItems: 'center' }} className="desktop-nav">
          {links.map(l => (
            <a key={l.label} href={l.href} style={{
              textDecoration: 'none', color: 'var(--fog)', fontFamily: "'Inter', sans-serif",
              fontSize: 12, letterSpacing: 2, textTransform: 'uppercase', transition: 'color 0.3s'
            }} onMouseOver={e => e.target.style.color = 'var(--bone)'} onMouseOut={e => e.target.style.color = 'var(--fog)'}>{l.label}</a>
          ))}
          <a href="https://www.doordash.com/store/revamped-coffee-co-belgrade-24566711/" target="_blank" rel="noopener" style={{
            textDecoration: 'none', color: 'var(--blood-light)', fontFamily: "'Inter', sans-serif",
            fontSize: 12, letterSpacing: 2, textTransform: 'uppercase', fontWeight: 600
          }}>Order Online</a>
        </div>

        {/* Mobile hamburger */}
        <button onClick={() => setMenuOpen(!menuOpen)} style={{
          display: 'none', background: 'none', border: 'none', color: 'var(--bone)',
          fontSize: 24, cursor: 'pointer', padding: 4
        }} className="mobile-toggle">
          {menuOpen ? '✕' : '☰'}
        </button>
      </div>

      {menuOpen && (
        <div style={{ padding: '0 24px 20px', display: 'flex', flexDirection: 'column', gap: 16 }}>
          {links.map(l => (
            <a key={l.label} href={l.href} onClick={() => setMenuOpen(false)} style={{

function Social() {
  const [fbLoaded, setFbLoaded] = useState(false);

  useEffect(() => {
    // Load Facebook SDK
    if (!document.getElementById('fb-sdk')) {
      const script = document.createElement('script');
      script.id = 'fb-sdk';
      script.src = 'https://connect.facebook.net/en_US/sdk.js#xfbml=1&version=v18.0';
      script.async = true;
      script.defer = true;
      script.crossOrigin = 'anonymous';
      script.onload = () => setFbLoaded(true);
      document.body.appendChild(script);
    } else {
      setFbLoaded(true);
    }
  }, []);

  useEffect(() => {
    if (fbLoaded && window.FB) {
      window.FB.XFBML.parse();
    }
  }, [fbLoaded]);

  return (
    <section id="social" style={{ padding: '120px 24px' }}>

            fontFamily: "'Cinzel Decorative', serif", fontSize: '2.5rem', fontWeight: 700,
            color: 'var(--bone)'
          }}>From the Crypt</h2>
        </div>

        <div style={{
          background: 'var(--charcoal)', border: '1px solid rgba(139,26,26,0.15)',
          padding: '32px', maxWidth: 700, margin: '0 auto'
        }}>
          <span style={{
            fontFamily: "'Inter', sans-serif", fontSize: 10, letterSpacing: 3,
